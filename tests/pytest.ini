# This file is used to configure the global behavior of pytest.
# It has been created to silence the DeprecationWarning generated by external libraries
# (such as SimpleITK or ruamel.yaml or sksurv) on more recent versions of Python. 
# In this way the output of pytest remains clean and focused on the actual test results.

[pytest]
filterwarnings =
    # Mutes warnings from Python's internal import system triggered by libraries like SimpleITK
    ignore::DeprecationWarning:importlib._bootstrap
    # Mutes warnings from numpy/sksurv regarding the deprecated trapz integration function
    ignore:.*trapz.*:DeprecationWarning